<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Fotokalender 2027</title>
<style>
  :root{
    --bg:#0e1116;
    --panel:#ffffff;
    --ink:#161a22;
    --muted:#6b7280;
    --line:#e7eaf0;
    --accent:#2f6fed;
    --sun:#d23b3b;
    --bday:#d97706;     /* Geburtstage – warmes Bernstein */
    --event:#7c3aed;    /* sonstige Termine */
    /* weiche, geschichtete Schatten */
    --sh-1:0 1px 2px rgba(16,24,40,.06), 0 1px 3px rgba(16,24,40,.10);
    --sh-2:0 2px 6px rgba(16,24,40,.08), 0 6px 16px rgba(16,24,40,.10);
    --sh-3:0 6px 14px rgba(16,24,40,.10), 0 14px 34px rgba(16,24,40,.14);
    --sh-panel:0 -2px 6px rgba(16,24,40,.05), 0 -12px 32px rgba(16,24,40,.10);
    --sh-blue:0 4px 10px rgba(47,111,237,.28), 0 10px 24px rgba(47,111,237,.22);
    --ease:cubic-bezier(.22,.61,.36,1);
  }
  *{box-sizing:border-box;}
  html,body{height:100%;margin:0;padding:0;overflow:hidden;}
  body{
    background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  .app{height:100vh;height:100dvh;display:flex;flex-direction:column;}

  /* ---------- FOTO ---------- */
  .stage{position:relative;flex:1 1 auto;min-height:0;background:#11151c;overflow:hidden;isolation:isolate;}
  .layer{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block;
         opacity:0;transition:opacity .55s var(--ease);z-index:1;}
  .layer.active{opacity:1;}
  .ph{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;
      gap:10px;text-align:center;padding:24px;background:linear-gradient(135deg,#2a3340,#161b22);color:#aeb7c4;z-index:2;}
  .ph.show{display:flex;}
  .ph .pic{font-size:54px;opacity:.5;}
  .ph .t1{font-size:1.25rem;font-weight:700;color:#cfd6e0;}

  .topbar{position:absolute;left:0;right:0;top:0;z-index:3;display:flex;align-items:flex-start;justify-content:space-between;
          gap:16px;padding:22px 26px;color:#fff;pointer-events:none;
          background:linear-gradient(to bottom,rgba(0,0,0,.5),rgba(0,0,0,0));}
  .title{font-size:clamp(1.5rem,3.4vw,2.4rem);font-weight:800;letter-spacing:-.01em;margin:0;line-height:1.1;text-shadow:0 2px 14px rgba(0,0,0,.45);}
  .sub{font-size:clamp(.85rem,1.6vw,1.05rem);opacity:.92;margin-top:4px;font-weight:600;text-shadow:0 2px 10px rgba(0,0,0,.5);}
  .today-btn{pointer-events:auto;appearance:none;border:0;cursor:pointer;background:rgba(255,255,255,.92);color:var(--ink);
             border-radius:999px;height:44px;padding:0 18px;font-weight:700;font-size:.95rem;box-shadow:var(--sh-2);
             -webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px);
             transition:transform .18s var(--ease),background .2s var(--ease),box-shadow .2s var(--ease);}
  .today-btn:hover{background:#fff;box-shadow:var(--sh-3);transform:translateY(-1px);}
  .today-btn:active{transform:scale(.95);}
  .today-btn:focus-visible{outline:3px solid var(--accent);outline-offset:2px;}

  .nav{position:absolute;top:50%;z-index:3;transform:translateY(-50%);width:44px;height:44px;border:0;cursor:pointer;
       background:rgba(0,0,0,.30);color:#fff;border-radius:999px;font-size:1.5rem;line-height:1;
       display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);
       box-shadow:var(--sh-2);transition:background .2s var(--ease),transform .18s var(--ease),box-shadow .2s var(--ease);}
  .nav:hover{background:rgba(0,0,0,.5);box-shadow:var(--sh-3);transform:translateY(-50%) scale(1.06);}
  .nav:active{transform:translateY(-50%) scale(.9);}
  .nav:focus-visible{outline:3px solid #fff;outline-offset:2px;}
  .nav.left{left:14px;} .nav.right{right:14px;}

  /* ---------- WOCHENLEISTE ---------- */
  .week{flex:0 0 auto;position:relative;z-index:2;background:var(--panel);
        display:grid;grid-template-columns:repeat(7,1fr);gap:6px;
        padding:16px clamp(12px,3vw,28px) 12px;box-shadow:var(--sh-panel);}
  .day{text-align:center;border-radius:14px;padding:9px 4px 10px;cursor:pointer;
       display:flex;flex-direction:column;align-items:center;gap:2px;min-height:70px;justify-content:flex-start;
       border:2px solid transparent;
       transition:background .2s var(--ease),border-color .2s var(--ease),box-shadow .2s var(--ease),transform .2s var(--ease);}
  .day:hover{background:#f4f6fa;transform:translateY(-2px);box-shadow:var(--sh-1);}
  .day .dow{font-size:.78rem;font-weight:700;letter-spacing:.05em;color:var(--muted);text-transform:uppercase;}
  .day .dnum{font-size:clamp(1.25rem,3vw,1.75rem);font-weight:800;line-height:1;}
  .day .lbl{font-size:.7rem;font-weight:700;line-height:1.05;margin-top:1px;max-width:100%;
            overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .day.sun .dow,.day.sun .dnum{color:var(--sun);}
  .day .lbl.bday{color:var(--bday);}
  .day .lbl.holiday{color:var(--sun);}
  .day .lbl.event{color:var(--event);}
  .day.today:not(.selected){border-color:var(--accent);}     /* heute: blauer Rahmen */
  .day.selected{background:var(--accent);transform:translateY(-2px);box-shadow:var(--sh-blue);}  /* ausgewählt */
  .day.selected:hover{background:var(--accent);}
  .day.selected .dow,.day.selected .dnum,.day.selected .lbl{color:#fff !important;}
  .day:focus-visible{outline:3px solid var(--accent);outline-offset:2px;}

  /* ---------- INFO / BESCHREIBUNG (über dem Foto) ---------- */
  .info{position:absolute;left:0;right:0;bottom:0;z-index:3;pointer-events:none;
        padding:64px clamp(16px,4vw,40px) max(16px,env(safe-area-inset-bottom));
        background:linear-gradient(to top,rgba(0,0,0,.82),rgba(0,0,0,.45) 52%,rgba(0,0,0,0));
        color:#fff;}
  .info-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:6px;}
  .seldate{font-size:.9rem;font-weight:700;color:rgba(255,255,255,.9);text-transform:uppercase;letter-spacing:.04em;
           text-shadow:0 1px 6px rgba(0,0,0,.55);}
  .otd-btn{pointer-events:auto;flex:0 0 auto;appearance:none;border:1.5px solid rgba(255,255,255,.5);cursor:pointer;
           background:rgba(255,255,255,.16);color:#fff;-webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px);
           border-radius:999px;height:38px;padding:0 16px;font-weight:700;font-size:.88rem;display:inline-flex;align-items:center;gap:7px;
           box-shadow:var(--sh-2);transition:transform .18s var(--ease),background .2s var(--ease),box-shadow .2s var(--ease),border-color .2s var(--ease);}
  .otd-btn:hover{background:rgba(255,255,255,.95);border-color:#fff;color:var(--accent);box-shadow:var(--sh-3);transform:translateY(-1px);}
  .otd-btn:active{transform:scale(.96);}
  .otd-btn:focus-visible{outline:3px solid #fff;outline-offset:2px;}
  .desc{pointer-events:auto;font-size:clamp(1rem,1.9vw,1.2rem);line-height:1.5;color:#fff;max-width:72ch;
        text-shadow:0 1px 8px rgba(0,0,0,.6);transition:opacity .25s var(--ease);}
  .desc.swap{opacity:0;}
  .desc.empty{color:rgba(255,255,255,.82);font-style:italic;}
  .desc.bday{color:#fcd34d;font-weight:700;font-style:normal;}
  .desc.holiday{color:#fca5a5;font-weight:700;font-style:normal;}
  .desc.event{color:#c4b5fd;font-weight:700;font-style:normal;}

  /* ---------- "AN DIESEM TAG" OVERLAY ---------- */
  .otd{position:fixed;inset:0;z-index:50;display:flex;align-items:center;justify-content:center;padding:24px;
       background:rgba(8,11,16,.55);-webkit-backdrop-filter:blur(5px);backdrop-filter:blur(5px);
       opacity:0;transition:opacity .25s var(--ease);}
  .otd[hidden]{display:none;}
  .otd.show{opacity:1;}
  .otd-card{background:var(--panel);border-radius:20px;box-shadow:var(--sh-3);width:min(620px,100%);max-height:82vh;
            display:flex;flex-direction:column;overflow:hidden;transform:translateY(8px) scale(.99);transition:transform .25s var(--ease);}
  .otd.show .otd-card{transform:none;}
  .otd-top{flex:0 0 auto;display:flex;align-items:center;justify-content:space-between;gap:12px;
           padding:18px clamp(16px,3vw,24px);border-bottom:1px solid var(--line);}
  .otd-top h2{margin:0;font-size:1.15rem;font-weight:800;letter-spacing:-.01em;}
  .otd-top .otd-date{font-size:.82rem;font-weight:700;color:var(--muted);margin-top:2px;}
  .otd-close{appearance:none;border:0;cursor:pointer;background:#f1f3f7;color:var(--ink);width:38px;height:38px;border-radius:999px;
             font-size:1.25rem;line-height:1;display:flex;align-items:center;justify-content:center;
             transition:background .2s var(--ease),transform .18s var(--ease);}
  .otd-close:hover{background:#e6e9f0;transform:rotate(90deg);}
  .otd-close:focus-visible{outline:3px solid var(--accent);outline-offset:2px;}
  .otd-body{flex:1 1 auto;overflow-y:auto;padding:8px clamp(16px,3vw,24px) 4px;}
  .otd-item{display:block;text-decoration:none;color:inherit;border-radius:14px;padding:13px 14px;margin:8px 0;
            border:1px solid var(--line);background:#fff;
            transition:background .18s var(--ease),border-color .18s var(--ease),box-shadow .18s var(--ease),transform .18s var(--ease);}
  .otd-item:hover{background:#f7f9ff;border-color:var(--accent);box-shadow:var(--sh-1);transform:translateY(-1px);}
  .otd-item:focus-visible{outline:3px solid var(--accent);outline-offset:2px;}
  .otd-item .yr{display:inline-block;font-weight:800;font-size:.85rem;color:var(--accent);
                background:rgba(47,111,237,.10);border-radius:7px;padding:2px 8px;margin-bottom:6px;}
  .otd-item.sci .yr{color:var(--bday);background:rgba(217,119,6,.12);}
  .otd-item .tx{font-size:1rem;line-height:1.45;color:var(--ink);}
  .otd-item .go{font-size:.78rem;font-weight:700;color:var(--muted);margin-top:6px;}
  .otd-item:hover .go{color:var(--accent);}
  .otd-msg{text-align:center;color:var(--muted);padding:34px 16px;font-size:1rem;line-height:1.5;}
  .otd-foot{flex:0 0 auto;border-top:1px solid var(--line);padding:14px clamp(16px,3vw,24px);text-align:center;}
  .otd-foot a{color:var(--accent);font-weight:700;font-size:.9rem;text-decoration:none;}
  .otd-foot a:hover{text-decoration:underline;}

  @media (max-width:560px){
    .day{min-height:60px;border-radius:11px;}
    .day .lbl{font-size:.62rem;}
    .topbar{padding:16px 14px;}
    .nav{width:38px;height:38px;font-size:1.3rem;}
  }

  @media (prefers-reduced-motion:reduce){
    *,.layer,.desc{transition:none !important;}
  }
</style>
</head>
<body>
<!-- =======================================================================
     FOTOS: Ordner "bilder" neben diese Datei legen, ein Foto pro Woche:

<div class="app">

  "Hier kommt die Geschichte zu diesem Foto hin – etwa 20 bis 50 Wörter. Trage sie oben bei WEEK_DESCRIPTIONS unter der Wochennummer ein.";

// SONSTIGE TERMINE (optional):  { date:"MM-TT", label:"Text" }
const EVENTS = [
  // { date:"09-12", label:"Hochzeitstag" },
];

// GESETZLICHE FEIERTAGE 2027 in BADEN-WÜRTTEMBERG (alle 12)
const HOLIDAYS = [
  { date:"01-01", label:"Neujahr" },
  { date:"01-06", label:"Heilige Drei Könige" },   // nur BW (u.a.)
  { date:"03-26", label:"Karfreitag" },
  { date:"03-29", label:"Ostermontag" },

  { date:"05-17", label:"Pfingstmontag" },

  { date:"10-03", label:"Tag der Deutschen Einheit" },
  { date:"11-01", label:"Allerheiligen" },         // nur BW (u.a.)

  { date:"12-26", label:"2. Weihnachtstag" },
];

/* =======================================================================
   AB HIER NICHTS MEHR ÄNDERN
   ======================================================================= */

// Kalender-Start = Tag der Schenkung. Woche 1 (erstes Foto) beginnt in dieser Woche.
const START_DATE=new Date(2026,6,18);   // 18. Juli 2026
const MONTHS=["Januar","Februar","März","April","Mai","Juni","Juli","August","September","Oktober","November","Dezember"];
const DOW=["Mo","Di","Mi","Do","Fr","Sa","So"];
const DOW_FULL=["Montag","Dienstag","Mittwoch","Donnerstag","Freitag","Samstag","Sonntag"];
const START_MON=mondayOf(START_DATE);
const LAST_MON=new Date(START_MON); LAST_MON.setDate(LAST_MON.getDate()+65*7);
const seqOf=d=>Math.round((mondayOf(d)-START_MON)/6.048e8)+1;   // 1 = Startwoche, +1 pro Woche
const inRange=d=>{const m=mondayOf(d);return m>=START_MON && m<=LAST_MON;};

// Maps nach "MM-TT"
const bdayMap={}; BIRTHDAYS.forEach(b=>{(bdayMap[b.date]=bdayMap[b.date]||[]).push(b.name);});
const holidayMap={}; HOLIDAYS.forEach(h=>holidayMap[h.date]=h.label);
const eventMap={}; EVENTS.forEach(e=>eventMap[e.date]=e.label);

const pad=n=>String(n).padStart(2,"0");
const md=d=>pad(d.getMonth()+1)+"-"+pad(d.getDate());
const sameDay=(a,b)=>a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate();

function mondayOf(date){const d=new Date(date.getFullYear(),date.getMonth(),date.getDate());d.setDate(d.getDate()-((d.getDay()+6)%7));return d;}
function isoWeek(date){const t=new Date(Date.UTC(date.getFullYear(),date.getMonth(),date.getDate()));
  t.setUTCDate(t.getUTCDate()-((t.getUTCDay()+6)%7)+3);
  const ft=new Date(Date.UTC(t.getUTCFullYear(),0,4));ft.setUTCDate(ft.getUTCDate()-((ft.getUTCDay()+6)%7)+3);
  return 1+Math.round((t-ft)/604800000);}
function monthLabel(s,e){return s.getMonth()===e.getMonth()?MONTHS[s.getMonth()]:MONTHS[s.getMonth()]+" / "+MONTHS[e.getMonth()];}
function clampAnchor(d){const m=mondayOf(d);return m<START_MON?new Date(START_MON):(m>LAST_MON?new Date(LAST_MON):d);}
function joinNames(a){return a.length<=1?a[0]:a.slice(0,-1).join(", ")+" und "+a[a.length-1];}

// Info zu einem Tag: {kind, cellText, descText}  (mehrere Anlässe werden kombiniert)
function dayInfo(d){
  const k=md(d);
  const parts=[];               // für die Beschreibung unten
  let cellText=null, kind=null; // Label in der Tageszelle (ein Anlass)
  if(bdayMap[k]){
    kind="bday"; cellText="🎂 "+joinNames(bdayMap[k]);
    parts.push("🎂 Geburtstag von "+joinNames(bdayMap[k]));
  }
  if(holidayMap[k]){
    if(!kind){ kind="holiday"; cellText=holidayMap[k]; }
    parts.push(holidayMap[k]);
  }
  if(eventMap[k]){
    if(!kind){ kind="event"; cellText=eventMap[k]; }
    parts.push(eventMap[k]);
  }
  if(!parts.length) return null;
  return { kind, cellText, descText: parts.join(" · ") };
}

const realToday=new Date();
let current=mondayOf(clampAnchor(realToday));
let selectedIdx = inRange(realToday) ? (realToday.getDay()+6)%7 : 0;
let selectedDate=null;   // wird in render() gesetzt – für "An diesem Tag"

const $=id=>document.getElementById(id);

// --- Foto-Cross-Fade über zwei Bild-Ebenen ---
const layers=[$("imgA"),$("imgB")];
let front=-1;            // -1 = noch keine Ebene sichtbar
function setPhoto(src,wk){
  const back = layers[front===0?1:0];
  back.onload = ()=>{
    $("ph").classList.remove("show");
    back.classList.add("active");
    layers.forEach((l,i)=>{ if(l!==back) l.classList.remove("active"); });
    front = layers.indexOf(back);
  };
  back.onerror = ()=>{
    $("ph").classList.add("show");
    layers.forEach(l=>l.classList.remove("active"));
    front=-1;
    $("phText").innerHTML='Foto für KW '+wk+' &middot; lege <b>'+IMAGE_FOLDER+'/w'+pad(wk)+'.jpg</b> ab';
  };
  back.alt="Foto Woche "+wk;
  back.src=src;
}

function render(){
  const days=[]; for(let i=0;i<7;i++){const d=new Date(current);d.setDate(d.getDate()+i);days.push(d);}
  const start=days[0], end=days[6], wk=isoWeek(start), seq=seqOf(start);

  // Foto (mit Cross-Fade)
  setPhoto(IMAGE_FOLDER+"/w"+pad(seq)+".jpg", seq);

  // Titel
  $("title").textContent=monthLabel(start,end);
  $("sub").textContent="Kalenderwoche "+wk;

  // Wochenleiste
  const weekEl=$("week"); weekEl.innerHTML="";
  days.forEach((d,i)=>{
    const info=dayInfo(d);
    const c=document.createElement("div");
    c.className="day"+(i===6?" sun":"");
    c.tabIndex=0; c.setAttribute("role","button");
    if(sameDay(d,realToday)) c.classList.add("today");
    if(i===selectedIdx) c.classList.add("selected");
    c.innerHTML='<span class="dow">'+DOW[i]+'</span><span class="dnum">'+d.getDate()+'</span>'
      +(info?'<span class="lbl '+info.kind+'">'+info.cellText+'</span>':'');
    const pick=()=>{selectedIdx=i;render();};
    c.onclick=pick;
    c.onkeydown=ev=>{if(ev.key==="Enter"||ev.key===" "){ev.preventDefault();pick();}};
    weekEl.appendChild(c);
  });

  // Info
  const sel=days[selectedIdx];
  selectedDate=sel;
  $("seldate").textContent=DOW_FULL[selectedIdx]+", "+sel.getDate()+". "+MONTHS[sel.getMonth()];
  const info=dayInfo(sel), desc=$("desc");
  if(info){
    desc.className="desc "+info.kind;
    desc.textContent=info.descText;
  }else{
    const txt=WEEK_DESCRIPTIONS[seq];
    desc.className="desc"+(txt?"":" empty");
    desc.textContent=txt||DEFAULT_DESCRIPTION;
  }
  // sanftes Einblenden des Textes
  desc.style.opacity="0";
  requestAnimationFrame(()=>{ desc.style.opacity="1"; });
}

$("prev").onclick=()=>{current.setDate(current.getDate()-7);render();};
$("next").onclick=()=>{current.setDate(current.getDate()+7);render();};
$("heute").onclick=()=>{current=mondayOf(clampAnchor(new Date()));
  selectedIdx=inRange(realToday)?(realToday.getDay()+6)%7:0;render();};
document.addEventListener("keydown",e=>{
  if(!$("otd").hidden){ if(e.key==="Escape") closeOtd(); return; }   // bei offenem Overlay keine Wochen-Navigation
  if(e.key==="ArrowLeft"){current.setDate(current.getDate()-7);render();}
  if(e.key==="ArrowRight"){current.setDate(current.getDate()+7);render();}
});

/* =======================================================================
   "AN DIESEM TAG" – englische Wikipedia (kuratierte Auswahl, Physik/Wissenschaft bevorzugt)
   ======================================================================= */
const EN_MONTHS=["January","February","March","April","May","June","July","August","September","October","November","December"];
// Stichwörter, die wissenschaftliche/physikalische Ereignisse höher gewichten
const SCI=["physic","quantum","relativity","atom","nuclear","particle","electron","proton","neutron","photon",
  "gravit","astronom","cosmolog","galaxy","planet","telescope","spacecraft","satellite","orbit","rocket","space",
  "nasa","apollo","launch","comet","asteroid","supernova","star","mathematic","theorem","chemis","element","molecul",
  "biolog","genetic","dna","scien","experiment","laborator","invent","engineer","technolog","computer","electric",
  "energy","radiation","discover","nobel","einstein","newton","curie","darwin","tesla","hawking","laser","x-ray","semiconductor"];
function sciScore(item){
  const hay=((item.text||"")+" "+(item.pages||[]).map(p=>p.normalizedtitle||p.title||"").join(" ")).toLowerCase();
  let s=0; SCI.forEach(w=>{ if(hay.indexOf(w)>=0) s++; });
  return s;
}
function escapeHtml(s){return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}

function openOtd(d){
  const mm=pad(d.getMonth()+1), dd=pad(d.getDate());
  $("otdDate").textContent=EN_MONTHS[d.getMonth()]+" "+d.getDate();
  $("otdMore").href="https://en.wikipedia.org/wiki/"+EN_MONTHS[d.getMonth()]+"_"+d.getDate();
  $("otdBody").innerHTML='<div class="otd-msg">Lade Ereignisse …</div>';
  const o=$("otd"); o.hidden=false; requestAnimationFrame(()=>o.classList.add("show"));
  $("otdClose").focus();

  fetch("https://en.wikipedia.org/api/rest_v1/feed/onthisday/selected/"+mm+"/"+dd)
    .then(r=>{ if(!r.ok) throw new Error("HTTP "+r.status); return r.json(); })
    .then(data=>{
      let items=(data.selected||[]).slice();
      items.forEach(it=>it._sci=sciScore(it));
      // Wissenschaft/Physik zuerst, danach chronologisch (älteste zuerst)
      items.sort((a,b)=> (b._sci-a._sci) || ((a.year||0)-(b.year||0)) );
      items=items.slice(0,5);
      if(!items.length){ $("otdBody").innerHTML='<div class="otd-msg">Für diesen Tag wurden keine Einträge gefunden.</div>'; return; }
      $("otdBody").innerHTML=items.map(it=>{
        const pg=(it.pages&&it.pages[0])||null;
        const url=pg&&pg.content_urls&&pg.content_urls.desktop?pg.content_urls.desktop.page:("https://en.wikipedia.org/wiki/"+EN_MONTHS[d.getMonth()]+"_"+d.getDate());
        const sci=it._sci>0?" sci":"";
        return '<a class="otd-item'+sci+'" href="'+escapeHtml(url)+'" target="_blank" rel="noopener noreferrer">'
          +'<span class="yr">'+escapeHtml(String(it.year||""))+'</span>'
          +'<div class="tx">'+escapeHtml(it.text||"")+'</div>'
          +'<div class="go">Auf Wikipedia öffnen ↗</div></a>';
      }).join("");
    })
    .catch(()=>{
      $("otdBody").innerHTML='<div class="otd-msg">Konnte nicht geladen werden.<br>Ist eine Internetverbindung vorhanden?</div>';
    });
}
function closeOtd(){
  const o=$("otd"); o.classList.remove("show");
  setTimeout(()=>{ o.hidden=true; }, 250);
  $("otdBtn").focus();
}
$("otdBtn").onclick=()=>{ if(selectedDate) openOtd(selectedDate); };
$("otdClose").onclick=closeOtd;
$("otd").addEventListener("click",e=>{ if(e.target===$("otd")) closeOtd(); });

render();
</script>
